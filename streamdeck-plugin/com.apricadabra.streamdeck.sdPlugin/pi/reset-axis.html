<!doctype html>
<html>
<head lang="en">
    <meta charset="utf-8" />
    <script src="sdpi-components.js"></script>
</head>
<body>
    <sdpi-item label="Axis">
        <sdpi-select setting="axis">
            <option value="">-- Select --</option>
            <option value="1">X</option>
            <option value="2">Y</option>
            <option value="3">Z</option>
            <option value="4">Rx</option>
            <option value="5">Ry</option>
            <option value="6">Rz</option>
            <option value="7">Slider 1</option>
            <option value="8">Slider 2</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Position">
        <sdpi-range setting="position" min="0" max="100" default="50"></sdpi-range>
    </sdpi-item>
</body>
</html>
