<!doctype html>
<html>
<head lang="en">
    <meta charset="utf-8" />
    <script src="sdpi-components.js"></script>
</head>
<body>
    <sdpi-item label="Label">
        <sdpi-textfield setting="label" placeholder="e.g. Speed Limiter"></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Axis">
        <sdpi-select setting="axis">
            <option value="">-- Select --</option>
            <option value="1">X</option>
            <option value="2">Y</option>
            <option value="3">Z</option>
            <option value="4">Rx</option>
            <option value="5">Ry</option>
            <option value="6">Rz</option>
            <option value="7">Slider 1</option>
            <option value="8">Slider 2</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Mode">
        <sdpi-select setting="mode" id="mode">
            <option value="hold">Hold</option>
            <option value="spring">Spring</option>
            <option value="detent">Detent</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Sensitivity">
        <sdpi-range setting="sensitivity" min="1" max="100" default="20"></sdpi-range>
    </sdpi-item>

    <sdpi-item label="Invert">
        <sdpi-checkbox setting="invert"></sdpi-checkbox>
    </sdpi-item>

    <sdpi-item label="Decay Rate" id="decayRateGroup" style="display:none">
        <sdpi-range setting="decayRate" min="1" max="99" default="95"></sdpi-range>
    </sdpi-item>

    <sdpi-item label="Steps" id="stepsGroup" style="display:none">
        <sdpi-range setting="steps" min="2" max="20" default="5"></sdpi-range>
    </sdpi-item>

    <sdpi-item label="Encoder Press">
        <sdpi-select setting="encoderButton" id="encoderButton">
            <option value="none">None</option>
        </sdpi-select>
    </sdpi-item>

    <script>
        // Populate encoder button options
        const sel = document.getElementById("encoderButton");
        for (let i = 1; i <= 128; i++) {
            const opt = document.createElement("option");
            opt.value = String(i);
            opt.textContent = `Button ${i}`;
            sel.appendChild(opt);
        }

        // Show/hide mode-specific fields
        const { streamDeckClient } = SDPIComponents;

        function updateVisibility(settings) {
            const mode = settings?.mode || "hold";
            document.getElementById("decayRateGroup").style.display = mode === "spring" ? "" : "none";
            document.getElementById("stepsGroup").style.display = mode === "detent" ? "" : "none";
        }

        streamDeckClient.didReceiveSettings.subscribe((ev) => {
            updateVisibility(ev.payload.settings);
        });

        // Also watch for mode changes
        document.getElementById("mode")?.addEventListener("change", () => {
            // Small delay to let sdpi-components sync the setting
            setTimeout(() => {
                streamDeckClient.getSettings().then((s) => updateVisibility(s));
            }, 50);
        });
    </script>
</body>
</html>
