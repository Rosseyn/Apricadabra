<!doctype html>
<html>
<head lang="en">
    <meta charset="utf-8" />
    <script src="sdpi-components.js"></script>
</head>
<body>
    <sdpi-item label="Button">
        <sdpi-select setting="button" id="buttonSelect">
            <option value="">-- Select --</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Mode">
        <sdpi-select setting="mode" id="mode">
            <option value="pulse">Pulse</option>
            <option value="momentary">Momentary</option>
            <option value="toggle">Toggle</option>
            <option value="double">Double Press</option>
            <option value="rapid">Rapid Fire</option>
            <option value="longshort">Long/Short</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Delay (ms)" id="delayGroup" style="display:none">
        <sdpi-range setting="delay" min="10" max="200" step="5" default="50"></sdpi-range>
    </sdpi-item>

    <sdpi-item label="Rate (ms)" id="rateGroup" style="display:none">
        <sdpi-range setting="rate" min="20" max="500" step="10" default="100"></sdpi-range>
    </sdpi-item>

    <sdpi-item label="Short Press" id="shortButtonGroup" style="display:none">
        <sdpi-select setting="shortButton" id="shortButton"></sdpi-select>
    </sdpi-item>

    <sdpi-item label="Long Press" id="longButtonGroup" style="display:none">
        <sdpi-select setting="longButton" id="longButton"></sdpi-select>
    </sdpi-item>

    <sdpi-item label="Threshold (ms)" id="thresholdGroup" style="display:none">
        <sdpi-range setting="threshold" min="100" max="2000" step="50" default="500"></sdpi-range>
    </sdpi-item>

    <script>
        // Populate button dropdowns
        function populateButtons(sel) {
            for (let i = 1; i <= 128; i++) {
                const opt = document.createElement("option");
                opt.value = String(i);
                opt.textContent = `Button ${i}`;
                sel.appendChild(opt);
            }
        }
        populateButtons(document.getElementById("buttonSelect"));
        populateButtons(document.getElementById("shortButton"));
        populateButtons(document.getElementById("longButton"));

        // Show/hide mode-specific fields
        const { streamDeckClient } = SDPIComponents;

        function updateVisibility(settings) {
            const mode = settings?.mode || "pulse";
            document.getElementById("delayGroup").style.display = mode === "double" ? "" : "none";
            document.getElementById("rateGroup").style.display = mode === "rapid" ? "" : "none";
            const isLS = mode === "longshort";
            document.getElementById("shortButtonGroup").style.display = isLS ? "" : "none";
            document.getElementById("longButtonGroup").style.display = isLS ? "" : "none";
            document.getElementById("thresholdGroup").style.display = isLS ? "" : "none";
        }

        streamDeckClient.didReceiveSettings.subscribe((ev) => {
            updateVisibility(ev.payload.settings);
        });

        document.getElementById("mode")?.addEventListener("change", () => {
            setTimeout(() => {
                streamDeckClient.getSettings().then((s) => updateVisibility(s));
            }, 50);
        });
    </script>
</body>
</html>
